<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Profile & Settings</title>
  <link rel="stylesheet" href="../css/global.css">
  <link rel="stylesheet" href="../css/profile.css">

  <!-- Poppins Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">

  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

  <!-- TOPBAR (reference from dashboard) -->
  <div class="topbar">
    <div class="logo-group">
      <div class="logo-icon"><i data-lucide="calendar"></i></div>
      <div class="logo-text">Event<span>ure</span></div>
    </div>
    <div class="nav-icons">
      <i data-lucide="home"    onclick="goTo('dashboard.html')"></i>
      <i data-lucide="compass" onclick="goTo('discover.html')"></i>
      <i data-lucide="mail"    onclick="goTo('invitation_page.html')"></i>
      <i data-lucide="user"    class="nav-active"></i>
      <i data-lucide="log-out" onclick="goTo('login.html')"></i>
    </div>
  </div>
  <!-- new container-->
  <div class="page-container">
    <!-- PAGE TITLE -->
    <div class="page-header">
      <h1>Profile & Settings</h1>
      <p>Manage your account preferences</p>
    </div>

    <!-- PROFILE CARD -->
    <div class="card profile-card">

      <!-- Avatar Section -->
      <div class="profile-top">
        <div class="profile-avatar">
          <i data-lucide="user"></i>
        </div>
        <div>
          <h2 id="displayName">You</h2>
          <p id="displayEmail">you@example.com</p>
        </div>
      </div>

      <!-- Editable Fields -->
      <div class="profile-fields">
        <div class="input-group">
          <label><i data-lucide="user"></i> Name</label>
          <input type="text" id="nameInput" value="You">
        </div>

        <div class="input-group">
          <label><i data-lucide="mail"></i> Email</label>
          <input type="email" id="emailInput" value="you@example.com">
        </div>

      </div>

      <!-- Save Button -->
      <button class="save-btn" onclick="saveProfile()">Save Changes</button>


    </div>

  </div>

  <script src="../js/profile.js"></script>
  <script>
    lucide.createIcons();
  </script>

</body>
</html>
