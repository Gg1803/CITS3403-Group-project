<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Eventure</title>

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="../css/global.css">
  <link rel="stylesheet" href="../css/login_signup.css">

  <!-- Icons -->
   <script src="https://unpkg.com/lucide@latest"></script>

</head>

<body>

  <div class="container">

    <!-- Logo -->
     <div class="logo-wrapper">
      <div class="logo-icon">
        <i data-lucide="calendar"></i>
      </div>
      <div class="logo">Event<span>ure</span></div>
     </div>
    <div class="subtitle">Let's plan events together!</div>

    <!-- Card -->
    <div class="card">

      <!-- Toggle -->
      <div class="toggle">
        <button id="loginBtn" class="active">Login</button>
        <button id="signupBtn">Sign Up</button>
      </div>

      <!-- Form -->
      <form id="form">

        <div id="nameField" class="hidden">
          <input type="text" placeholder="Your awesome name">
        </div>

        <input type="email" placeholder="you@example.com">
        <input type="password" placeholder="Password">

        <button type="button" class="main-button" id="submitBtn">
          Let's go!
        </button>

      </form>

      <div class="small-text" id="extraText">Forgot password?</div>

    </div>

  </div>

  <!-- JS -->
  <script src="../js/login_signup.js"></script>

  <!-- Lucide init -->
   <script>
    lucide.createIcons();
   </script>

</body>
</html>
