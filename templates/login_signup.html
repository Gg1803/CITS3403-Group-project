<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Eventure — Login</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="{{ url_for('static', filename='css/global.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/login_signup.css') }}">

  <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body>
  <div class="container">

    <!-- Logo -->
    <div class="logo-wrapper">
      <div class="logo-icon">
        <i data-lucide="calendar"></i>
      </div>
      <div class="logo">Event<span>ure</span></div>
    </div>
    <div class="subtitle">Let's plan events together!</div>

    <!-- Card -->
    <div class="card">

      <!-- Toggle -->
      <div class="toggle">
        <button id="loginBtn" class="active">Log In</button>
        <button id="signupBtn">Sign Up</button>
      </div>

      <!-- Form -->
      <form id="form" onsubmit="return false;">

        <!-- Name (sign up only) -->
        <div id="nameField" class="input-group hidden">
          <label for="nameInput">Full Name</label>
          <input id="nameInput" type="text" placeholder="Your name" />
        </div>

        <div class="input-group">
          <label for="emailInput">Email</label>
          <input id="emailInput" type="email" placeholder="you@example.com" />
        </div>

        <div class="input-group">
          <label for="passwordInput">Password</label>
          <input id="passwordInput" type="password" placeholder="Enter your password" />
        </div>

        <button type="button" class="main-button" id="submitBtn">Log In</button>

      </form>

      <div class="small-text" id="extraText">Forgot password?</div>

    </div>
  </div>

  <script src="{{ url_for('static', filename='js/login_signup.js') }}"></script>
  <script>lucide.createIcons();</script>
</body>
</html>
