<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Profile & Settings</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/global.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/dashboard.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/profile.css') }}">

  <!-- Poppins Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">

  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

  <div class="container">

    <!-- TOPBAR (same as dashboard) -->
    <div class="topbar">
      <div class="logo-group">
        <div class="logo-icon"><i data-lucide="calendar"></i></div>
        <div class="logo-text">Event<span>ure</span></div>
      </div>
      <div class="nav-icons">
        <i data-lucide="home"    onclick="goTo('/dashboard')"></i>
        <i data-lucide="compass" onclick="goTo('/discover')"></i>
        <i data-lucide="mail"    onclick="goTo('/invitations')"></i>
        <i data-lucide="user"    onclick="goTo('/profile')"></i>
        <i data-lucide="log-out" onclick="goTo('/login')"></i>
      </div>
    </div>

    <!-- HEADER (same style as dashboard) -->
    <div class="header">
      <div>
        <h1>My Profile</h1>
        <p>Manage your account details</p>
      </div>
    </div>

    <!-- PROFILE CARD -->
    <div class="card profile-card">

      <!-- Avatar -->
      <div class="profile-top">
        <div class="profile-avatar">
          <i data-lucide="user"></i>
        </div>
        <div>
          <h2 id="displayName">You</h2>
          <p id="displayEmail">you@example.com</p>
        </div>
      </div>

      <!-- DETAILS -->
      <div class="profile-fields">
        <div class="input-group">
          <label><i data-lucide="user"></i> Name</label>
          <input type="text" id="nameInput">
        </div>

        <div class="input-group">
          <label><i data-lucide="mail"></i> Email</label>
          <input type="email" id="emailInput">
        </div>
      </div>

      <button class="create-btn" onclick="saveProfile()">Save Changes</button>

    </div>

    <!-- PASSWORD CARD -->
    <div class="card profile-card" style="margin-top:20px;">

      <h2 style="margin-bottom: 20px;">Change Password</h2>

      <div class="profile-fields">
        <div class="input-group">
          <label>Current Password</label>
          <input type="password" id="currentPassword">
        </div>

        <div class="input-group">
          <label>New Password</label>
          <input type="password" id="newPassword">
        </div>
      </div>

      <button class="create-btn" onclick="changePassword()">Update Password</button>

    </div>

  </div>

  <script src="{{ url_for('static', filename='js/profile.js') }}"></script>
  <script>
    lucide.createIcons();
  </script>

</body>
</html>
